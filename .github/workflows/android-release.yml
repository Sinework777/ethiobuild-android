name: Android Release Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android (AAB)
    runs-on: ubuntu-latest

    env:
      JAVA_VERSION: "17"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Release AAB
        run: ./gradlew bundleRelease

      - name: Verify AAB exists
        run: ls -R app/build/outputs/bundle/release/

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: app/build/outputs/bundle/release/*.aab

deploy-android:
  name: Deploy to Play Store
  needs: build-android
  runs-on: ubuntu-latest
  if: false

    steps:
      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: android-aab
          path: app_binary

      - name: Write Play Store key
        run: |
          echo '${{ secrets.PLAY_STORE_JSON_KEY }}' > play-store-key.json

      - name: Install Fastlane
        run: sudo gem install fastlane

      - name: Upload to Play Store (Internal)
        run: |
          fastlane supply \
            --aab app_binary/*.aab \
            --json_key play-store-key.json \
            --package_name "com.ethiobuild.app" \
            --track internal \
            --skip_upload_metadata true \
            --skip_upload_images true \
            --skip_upload_screenshots true
