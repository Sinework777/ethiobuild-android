name: Android Release Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android (AAB)
    runs-on: ubuntu-latest

    env:
      JAVA_VERSION: "17"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Restore Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android.keystore
          ls -la android.keystore

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          cat local.properties

      - name: Create gradle.properties signing values
        run: |
          cat >> gradle.properties <<EOF
          android.suppressUnsupportedCompileSdk=36
          MYAPP_UPLOAD_STORE_FILE=../android.keystore
          MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_STORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_ALIAS=ims-key
          MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
          cat gradle.properties

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Release AAB
        run: ./gradlew bundleRelease

      - name: Verify AAB exists
        run: ls -R app/build/outputs/bundle/release/

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

  deploy-android:
    name: Deploy to Play Store
    needs: build-android
    runs-on: ubuntu-latest
    if: false

    steps:
      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: android-aab
          path: app_binary

      - name: Write Play Store key
        run: |
          cat <<'EOF' > play-store-key.json
          ${{ secrets.PLAY_STORE_JSON_KEY }}
          EOF

      - name: Install Fastlane
        run: sudo gem install fastlane

      - name: Upload to Play Store (Internal)
        run: |
          fastlane supply \
            --aab app_binary/*.aab \
            --json_key play-store-key.json \
            --package_name "com.ethiobuild.app" \
            --track internal \
            --skip_upload_metadata true \
            --skip_upload_images true \
            --skip_upload_screenshots true
